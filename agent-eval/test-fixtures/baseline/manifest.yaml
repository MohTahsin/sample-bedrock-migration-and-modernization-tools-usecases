# Baseline Test Corpus Manifest
#
# This file maps trace JSON files to their expected outcome keys and provides
# metadata about each trace in the baseline validation corpus.
#
# Naming Convention:
#   - File names: use underscores (good_001_direct_answer.json)
#   - Trace IDs / Expected outcome keys: use hyphens (good-001)
#
# This allows filesystem-friendly names while maintaining clean YAML keys.

version: "1.0"
description: "Baseline validation corpus for adapter testing"
total_traces: 11

# Base directory for all trace files (relative to this manifest)
base_dir: "."

# Metadata
metadata:
  owner: "agent-eval"
  corpus_type: "baseline"
  schema_version: "1.0"
  intended_use:
    - "adapter validation"
    - "deterministic metric validation"
    - "judge smoke testing"
    - "regression detection"
  validation_types:
    deterministic: "Exact match validation (turn counts, tool counts, latency presence)"
    judge_based: "LLM judge evaluation (accuracy, groundedness, tool use quality)"
    behavioral: "Graceful degradation and error handling"

traces:
  - file: good_001_direct_answer.json
    trace_id: good-001
    expected_outcome_key: good-001
    category: clearly_good
    description: "Direct answer, no tools needed"
    validates:
      - name: "Basic turn parsing"
        type: deterministic
      - name: "Answer extraction"
        type: deterministic
      - name: "Single-turn handling"
        type: deterministic
    
  - file: good_002_tool_grounded.json
    trace_id: good-002
    expected_outcome_key: good-002
    category: clearly_good
    description: "Tool used correctly, answer grounded"
    validates:
      - name: "Tool call/result pairing"
        type: deterministic
      - name: "Latency tracking"
        type: deterministic
      - name: "Tool linkage via tool_run_id normalization"
        type: deterministic
    
  - file: good_003_two_turn_noise.json
    trace_id: good-003
    expected_outcome_key: good-003
    category: clearly_good
    description: "Two-turn conversation with noise filtering"
    validates:
      - name: "Multi-turn handling"
        type: deterministic
      - name: "Same session, different turn IDs"
        type: deterministic
      - name: "Noise event filtering (debug.log, internal.metric)"
        type: behavioral
      - name: "Turn boundary detection"
        type: deterministic
    
  - file: bad_001_wrong_math.json
    trace_id: bad-001
    expected_outcome_key: bad-001
    category: clearly_bad
    description: "Clearly wrong answer, no tools"
    validates:
      - name: "Quality detection without tools"
        type: judge_based
      - name: "Factual incorrectness detection"
        type: judge_based
    
  - file: bad_002_ignores_tool.json
    trace_id: bad-002
    expected_outcome_key: bad-002
    category: clearly_bad
    description: "Tool used but result ignored"
    validates:
      - name: "Groundedness detection"
        type: judge_based
      - name: "Tool result contradiction detection"
        type: judge_based
    
  - file: bad_003_tool_failed_hallucinated.json
    trace_id: bad-003
    expected_outcome_key: bad-003
    category: clearly_bad
    description: "Failed tool and hallucinated confident answer"
    validates:
      - name: "Tool failure detection"
        type: deterministic
      - name: "Tool error status extraction"
        type: deterministic
      - name: "Hallucination after failure detection"
        type: judge_based
      - name: "Tool success rate calculation (0.0)"
        type: deterministic
    
  - file: partial_001_incomplete_but_ok.json
    trace_id: partial-001
    expected_outcome_key: partial-001
    category: partial
    description: "Incomplete but acceptable answer"
    validates:
      - name: "Partial answer handling"
        type: judge_based
      - name: "Brief but correct response evaluation"
        type: judge_based
    
  - file: partial_002_hedged_without_tool.json
    trace_id: partial-002
    expected_outcome_key: partial-002
    category: ambiguous
    description: "Answer hedged, tool missing"
    validates:
      - name: "Hedged answer handling"
        type: judge_based
      - name: "Missing tool usage detection"
        type: judge_based
      - name: "No tool call processing"
        type: deterministic
    
  - file: ambiguous_001_hedged_without_tool.json
    trace_id: ambiguous-001
    expected_outcome_key: ambiguous-001
    category: ambiguous
    description: "Answer hedged, tool missing"
    validates:
      - name: "Uncertainty detection"
        type: judge_based
      - name: "Missing tool usage detection"
        type: judge_based
    
  - file: weird_001_duplicate_tool_calls.json
    trace_id: weird-001
    expected_outcome_key: weird-001
    category: tool_weird
    description: "Duplicate tool call events"
    validates:
      - name: "Tool call deduplication logic"
        type: behavioral
      - name: "Same tool_run_id handling"
        type: deterministic
      - name: "Raw vs normalized tool counts"
        type: deterministic
    
  - file: weird_002_orphan_tool_result.json
    trace_id: weird-002
    expected_outcome_key: weird-002
    category: tool_weird
    description: "Orphan tool result, missing linkage"
    validates:
      - name: "Orphan result detection"
        type: deterministic
      - name: "Graceful degradation (no crash)"
        type: behavioral
      - name: "Orphan penalty application"
        type: deterministic

categories:
  clearly_good:
    count: 3
    description: "Correct answers, proper tool usage, clean execution"
  clearly_bad:
    count: 3
    description: "Wrong answers, ignored tools, hallucinations"
  partial:
    count: 1
    description: "Incomplete but acceptable responses"
  ambiguous:
    count: 2
    description: "Hedged answers, uncertain responses"
  tool_weird:
    count: 2
    description: "Edge cases in tool call/result handling"
