      knowledge_base_queries: 1
      final_answer_present: true
      confidence_range: [0.8, 1.0]
      mapping_coverage_range: [0.85, 1.0]
    
  - trace_id: noisy_production_001
    filename: noisy_production_001.json
    source_system: Production Agent Logs
    source_environment: production
    date_captured: "2024-03-04"
    anonymization_status: Debug info preserved, user data removed
    why_this_trace: Real trace with logging noise and debug events
    expected_outcomes:
      turn_count: 4
      turn_count_range: [3, 5]
      segmentation_strategy: "TURN_ID"  # Actual adapter strategy name
