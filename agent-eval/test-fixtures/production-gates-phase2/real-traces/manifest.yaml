    why_this_trace: Bedrock agent with action groups and knowledge base
    expected_outcomes:
      turn_count: 2
      turn_count_range: [2, 2]
      segmentation_strategy: "TURN_ID"  # Actual adapter strategy name
      tool_calls: 3
      tool_calls_tolerance: 0  # Exact match for stable traces
