# Real Trace Fixtures Manifest
# 
# This file documents the provenance and expected outcomes for all real production traces
# used in Phase 2 testing.

version: "1.0"
last_updated: "2024-03-09"

traces:
  - trace_id: cloudwatch_agentcore_001
    filename: cloudwatch_agentcore_001.json
    source_system: AWS CloudWatch Logs
    source_environment: production
