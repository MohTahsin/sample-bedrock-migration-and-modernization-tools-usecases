  - trace_id: multi_session_stitched_001
    filename: multi_session_stitched_001.json
    source_system: Session Stitching Pipeline
    source_environment: production
    date_captured: "2024-03-05"
    anonymization_status: Session IDs hashed, timestamps preserved
    why_this_trace: Multiple sessions stitched together for analysis
    expected_outcomes:
      turn_count: 8
      turn_count_range: [7, 9]
      segmentation_strategy: "SESSION_PLUS_TRACE_THEN_ANCHOR_SPLIT"  # Actual adapter strategy name
      session_boundaries: 2
      cross_session_tool_contamination: false
      confidence_range: [0.6, 0.9]
      mapping_coverage_range: [0.7, 0.95]

# Notes:
# - All traces have been anonymized to remove PII
# - Session IDs are hashed with SHA-256
# - Timestamps are preserved for temporal analysis
# - Expected outcomes are based on manual inspection and validation
# - Ranges allow for minor variations in adapter behavior
# - Segmentation strategies: TURN_ID, SESSION_PLUS_REQUEST, SESSION_PLUS_TRACE_THEN_ANCHOR_SPLIT, SINGLE_TURN
# - Event kinds: USER_INPUT, MODEL_INVOKE, LLM_OUTPUT_CHUNK, TOOL_CALL, TOOL_RESULT, PROMPT_CONTEXT, EVENT
# - tool_calls_tolerance: 0 = exact match, 1 = ±1 tolerance for ambiguous traces
# - warnings_keywords: Use keyword matching, not exact text matching
