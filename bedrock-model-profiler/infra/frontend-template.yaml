AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Bedrock Model Profiler - Frontend CloudFront + S3 Distribution + Data Bucket

Parameters:
  DomainName:
    Type: String
    Description: Custom domain name for the CloudFront distribution. Leave empty to skip custom domain setup.
    Default: ''

  HostedZoneId:
    Type: String
    Description: Route 53 Hosted Zone ID for the parent domain (required if DomainName is set)
    Default: ''

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, '']]

Resources:
  #############################################
  # S3 Bucket for Frontend Static Files
  #############################################
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3600

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  #############################################
  # S3 Bucket for Pipeline Data Storage
  #############################################
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-data-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldExecutions
            Status: Enabled
            Prefix: executions/
            ExpirationInDays: 30
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 7
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource:
              - !Sub '${DataBucket.Arn}/latest/*'
              - !Sub '${DataBucket.Arn}/config/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  #############################################
  # CloudFront Origin Access Control
  #############################################
  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-frontend-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  DataBucketOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-data-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  #############################################
  # CloudFront Function — redirect to custom domain
  #############################################
  DomainRedirectFunction:
    Type: AWS::CloudFront::Function
    Condition: HasCustomDomain
    Properties:
      Name: !Sub '${AWS::StackName}-domain-redirect'
      AutoPublish: true
      FunctionConfig:
        Comment: !Sub 'Redirect CloudFront domain to ${DomainName}'
        Runtime: cloudfront-js-2.0
      FunctionCode: !Sub |
        function handler(event) {
          var host = event.request.headers.host.value;
          if (host !== '${DomainName}') {
            return {
              statusCode: 301,
              statusDescription: 'Moved Permanently',
              headers: { location: { value: 'https://${DomainName}' + event.request.uri } }
            };
          }
          return event.request;
        }

  #############################################
  # CloudFront Distribution
  #############################################
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn:
      - DataBucket
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub 'Bedrock Model Profiler - ${AWS::StackName}'
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100

        # Custom domain configuration (conditional)
        Aliases: !If
          - HasCustomDomain
          - - !Ref DomainName
          - !Ref 'AWS::NoValue'
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref Certificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - !Ref 'AWS::NoValue'

        # Origins
        Origins:
          # Frontend static files origin
          - Id: FrontendOrigin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref FrontendOAC

          # Data bucket origin (for /latest/* and /config/* requests)
          - Id: DataOrigin
            DomainName: !GetAtt DataBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref DataBucketOAC

        # Default behavior - serve frontend files
        DefaultCacheBehavior:
          TargetOriginId: FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: !Ref FrontendCachePolicy
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          FunctionAssociations: !If
            - HasCustomDomain
            - - EventType: viewer-request
                FunctionARN: !GetAtt DomainRedirectFunction.FunctionARN
            - !Ref 'AWS::NoValue'

        # Cache behaviors for data paths - serve from data bucket
        CacheBehaviors:
          - PathPattern: '/latest/*'
            TargetOriginId: DataOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: !Ref DataCachePolicy
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
            FunctionAssociations: !If
              - HasCustomDomain
              - - EventType: viewer-request
                  FunctionARN: !GetAtt DomainRedirectFunction.FunctionARN
              - !Ref 'AWS::NoValue'

          - PathPattern: '/config/*'
            TargetOriginId: DataOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: !Ref DataCachePolicy
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
            FunctionAssociations: !If
              - HasCustomDomain
              - - EventType: viewer-request
                  FunctionARN: !GetAtt DomainRedirectFunction.FunctionARN
              - !Ref 'AWS::NoValue'

        # Custom error responses for SPA routing
        # Note: These apply to ALL origins including DataOrigin.
        # The frontend handles HTML-instead-of-JSON responses gracefully.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10

  #############################################
  # CloudFront Cache Policies
  #############################################
  FrontendCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-frontend-cache'
        DefaultTTL: 86400
        MaxTTL: 31536000
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true

  DataCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-data-cache'
        DefaultTTL: 3600
        MaxTTL: 86400
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true

  #############################################
  # ACM Certificate (DNS-validated, us-east-1)
  #############################################
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  #############################################
  # Route 53 DNS Record
  #############################################
  DNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront's fixed hosted zone ID
        EvaluateTargetHealth: false

  DNSRecordIPv6:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront's fixed hosted zone ID
        EvaluateTargetHealth: false

  #############################################
  # Security Headers Policy
  #############################################
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub '${AWS::StackName}-security-headers'
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Override: true
          XSSProtection:
            ModeBlock: true
            Protection: true
            Override: true

Outputs:
  FrontendBucketName:
    Description: Name of the S3 bucket for frontend files
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub '${AWS::StackName}-FrontendBucket'

  DataBucketName:
    Description: Name of the S3 data bucket
    Value: !Ref DataBucket
    Export:
      Name: !Sub '${AWS::StackName}-DataBucket'

  DataBucketArn:
    Description: ARN of the S3 data bucket
    Value: !GetAtt DataBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DataBucketArn'

  CloudFrontDistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${AWS::StackName}-DistributionId'

  CloudFrontDomainName:
    Description: CloudFront Distribution Domain Name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub '${AWS::StackName}-DomainName'

  CloudFrontURL:
    Description: CloudFront Distribution URL
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-URL'

  CustomDomainURL:
    Condition: HasCustomDomain
    Description: Custom domain URL
    Value: !Sub 'https://${DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-CustomDomainURL'

  CertificateArn:
    Condition: HasCustomDomain
    Description: ACM Certificate ARN
    Value: !Ref Certificate
    Export:
      Name: !Sub '${AWS::StackName}-CertificateArn'
